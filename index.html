        /* 처음에는 아예 안 보이게 설정 */
        #mainContent { max-width: 600px; margin: 0 auto; display: none; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .search-box { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; margin-bottom: 20px; outline: none; box-sizing: border-box; }

        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; border-left: 6px solid var(--primary-color); }
        
        .card-top { display: flex; align-items: center; margin-bottom: 15px; gap: 15px; }
        .profile-img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; background: #eee; }
        .name-info h3 { margin: 0; font-size: 20px; color: #0f172a; }
        .name-info p { margin: 4px 0 0; font-size: 14px; color: #64748b; }

        .info-grid { display: grid; grid-template-columns: 1fr; gap: 10px; background: #f1f5f9; padding: 15px; border-radius: 12px; }
        .info-item { display: flex; flex-direction: column; gap: 2px; }
        .label { font-size: 11px; font-weight: 800; color: #64748b; }
        .value { font-size: 15px; color: #334155; white-space: pre-wrap; } /* 줄바꿈 허용 */
        
        .btn-call { display: block; text-align: center; background: #2563eb; color: white; text-decoration: none; padding: 12px; border-radius: 8px; margin-top: 15px; font-weight: bold; }
    </style>

                        </div>

                    <div class="info-grid">
                        ${p.phone ? `<div class="info-item"><span class="label">연락처</span><span class="value">${p.phone}</span></div>` : ''}

                        ${p.size ? `<div class="info-item"><span class="label">신체 사이즈</span><span class="value">${p.size}</span></div>` : ''}

            const filtered = privateData.filter(p => 
                p.name.includes(query) || p.trait.includes(query) || (p.memo && p.memo.includes(query))
            );
            displayData(filtered);
        };

    <div id="listContainer"></div>
