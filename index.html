<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 스마트 인물 수첩 (엑셀 연동)</title>
    <style>
        :root { --primary-color: #2563eb; --bg-color: #f8fafc; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: #1e293b; }
        #mainContent { max-width: 600px; margin: 0 auto; display: none; }
        .link-container { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .link-item { margin-bottom: 10px; font-size: 14px; }
        .link-item b { color: var(--primary-color); display: inline-block; min-width: 80px; }
        .header { text-align: center; margin-bottom: 25px; }
        .search-box { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 6px solid var(--primary-color); }
        .card-top { display: flex; align-items: center; margin-bottom: 15px; gap: 15px; }
        .profile-img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; background: #eee; }
        .info-grid { display: grid; grid-template-columns: 1fr; gap: 10px; background: #f1f5f9; padding: 15px; border-radius: 12px; }
        .info-item { display: flex; flex-direction: column; gap: 2px; }
        .label { font-size: 11px; font-weight: 800; color: #64748b; }
        .value { font-size: 15px; color: #334155; white-space: pre-wrap; }
        .live-memo-container { margin-top: 15px; padding-top: 15px; border-top: 1px solid #e2e8f0; }
        .live-memo-area { width: 100%; height: 80px; border: 1px solid #cbd5e1; border-radius: 8px; padding: 10px; font-size: 14px; background: #fffde7; box-sizing: border-box; }
        .btn-call { display: block; text-align: center; background: #2563eb; color: white; text-decoration: none; padding: 12px; border-radius: 8px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<script>
    // 🔗 1단계에서 복사한 구글 시트 CSV 링크를 여기에 넣으세요
    const csvUrl = "D:\하드백업\꽃\인명.xlsx";
    const myPassword = "1234"; 
    let privateData = [];

    const login = prompt("비밀번호를 입력하세요.");

    if (login !== myPassword) {
        alert("비밀번호가 틀렸습니다.");
        window.stop();
        document.body.innerHTML = "<h2 style='text-align:center; margin-top:50px;'>접근 권한이 없습니다.</h2>";
    } else {
        // 엑셀(CSV) 데이터 가져오기 함수
        async function fetchExcelData() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1); // 헤더 제외
                
                privateData = rows.map(row => {
                    const cols = row.split(',');
                    return {
                        id: cols[0]?.trim(),
                        name: cols[1]?.trim(),
                        role: cols[2]?.trim(),
                        phone: cols[3]?.trim(),
                        photo: cols[4]?.trim(),
                        address: cols[5]?.trim(),
                        size: cols[6]?.trim(),
                        trait: cols[7]?.trim(),
                        memo: cols[8]?.trim(),
                        notion: cols[9]?.trim()
                    };
                }).filter(p => p.name); // 이름이 있는 행만 포함

                displayData(privateData);
                document.getElementById('mainContent').style.display = 'block';
            } catch (error) {
                alert("데이터를 불러오는 중 오류가 발생했습니다. 링크를 확인해주세요.");
            }
        }

        window.saveMemo = function(id, val) {
            localStorage.setItem('memo_' + id, val);
        };

        function displayData(data) {
            const container = document.getElementById('listContainer');
            container.innerHTML = data.map(p => {
                const savedMemo = localStorage.getItem('memo_' + p.id) || "";
                return `
                <div class="card">
                    <div class="card-top">
                        <img src="${p.photo}" class="profile-img" onerror="this.src='https://via.placeholder.com/100?text=No+Photo'">
                        <div class="name-info"><h3>${p.name}</h3><p>${p.role}</p></div>
                    </div>
                    <div class="info-grid">
                        ${p.phone ? `<div class="info-item"><span class="label">연락처</span><span class="value">${p.phone}</span></div>` : ''}
                        ${p.address ? `<div class="info-item"><span class="label">주소</span><span class="value">${p.address}</span></div>` : ''}
                        ${p.size ? `<div class="info-item"><span class="label">사이즈</span><span class="value">${p.size}</span></div>` : ''}
                        ${p.memo ? `<div class="info-item"><span class="label">기본 메모</span><span class="value">${p.memo}</span></div>` : ''}
                        ${p.notion ? `<div class="info-item"><span class="label">노션 링크</span><span class="value"><a href="${p.notion}" target="_blank" style="color:#2563eb;">노션 바로가기</a></span></div>` : ''}
                    </div>
                    <div class="live-memo-container">
                        <span class="label">현장 기록 (기기 저장)</span>
                        <textarea class="live-memo-area" oninput="saveMemo('${p.id}', this.value)">${savedMemo}</textarea>
                    </div>
                    ${p.phone ? `<a href="tel:${p.phone}" class="btn-call">📞 전화 걸기</a>` : ''}
                </div>
            `}).join('');
        }

        window.filterData = function() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = privateData.filter(p => p.name.includes(query) || (p.trait && p.trait.includes(query)));
            displayData(filtered);
        };

        document.addEventListener("DOMContentLoaded", fetchExcelData);
    }
</script>

<div id="mainContent">
    <div class="header"><h2>🔒 인물 수첩 (엑셀 연동형)</h2></div>
    <input type="text" id="search" class="search-box" placeholder="이름 검색..." onkeyup="filterData()">
    <div id="listContainer"></div>
</div>

</body>
</html>
