<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 SMART 실전 전략 수첩</title>
    <style>
        :root { --메인: #e11d48; --포인트: #2563eb; --배경: #f1f5f9; }
        body { font-family: 'Malgun Gothic', sans-serif; background: var(--배경); margin: 0; padding: 10px; color: #1e293b; }
        
        #auth-section { margin: 100px auto; text-align: center; max-width: 350px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 70%; margin-bottom: 10px; font-size: 16px; }
        button { padding: 12px 20px; background: var(--메인); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 80%; }

        #mainContent { max-width: 650px; margin: 0 auto; display: none; }
        .sticky-header { position: sticky; top: 0; background: var(--배경); z-index: 1000; padding: 10px 0; }
        .search-box { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 15px; outline: none; }

        /* 탭 영역: 한 줄 고정 및 가로 스크롤 */
        .card-photo-tabs { 
            display: flex !important; 
            flex-wrap: nowrap !important;
            gap: 6px; 
            margin: 12px 0; 
            padding: 5px 0 10px 0; 
            overflow-x: auto !important; 
            overflow-y: hidden !important; 
            width: 100%;
            -webkit-overflow-scrolling: touch;
        }

        /* [수정] 탭 버튼: 글자 길이에 맞춰 너비 자동 조절 */
        .p-btn { 
            flex: 0 0 auto !important; /* 찌그러짐 방지 */
            min-width: fit-content;    /* 글자 크기에 맞춤 */
            padding: 5px 12px; 
            background: #ffffff; 
            border: 1px solid #cbd5e1; 
            border-radius: 15px; 
            cursor: pointer; 
            font-size: 11px;           /* 글자 살짝 작게 */
            font-weight: bold; 
            color: #475569; 
            white-space: nowrap !important; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .p-btn.active { background: var(--포인트); color: white; border-color: var(--포인트); }

        /* 사진 영역 */
        .photo-list { 
            display: flex !important; 
            flex-wrap: nowrap !important;
            gap: 10px; 
            overflow-x: auto !important; 
            margin-bottom: 15px; 
            padding-bottom: 10px;
            min-height: 120px;
        }
        .photo-item { flex: 0 0 120px; width: 120px; height: 120px; border-radius: 10px; overflow: hidden; background: #eee; border: 1px solid #ddd; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }

        /* 카드 및 데이터 그리드 확장 */
        .card { background: white; border-radius: 15px; padding: 18px; margin-bottom: 25px; box-shadow: 0 3px 12px rgba(0,0,0,0.06); border: 1px solid #e2e8f0; overflow: hidden; }
        .name-row { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; margin-bottom: 15px; }
        .name { font-size: 1.4em; font-weight: 900; }
        .sub-text { font-size: 0.85em; color: #64748b; }

        /* [수정] 항목 표시 영역: 2단 그리드로 더 많은 항목 표시 */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 15px; }
        .box { background: #f8fafc; padding: 8px 10px; border-radius: 6px; display: flex; justify-content: space-between; font-size: 12px; border: 1px solid #f1f5f9; }
        .label { color: #64748b; font-weight: bold; margin-right: 5px; }
        .val { color: #1e293b; font-weight: bold; text-align: right; word-break: break-all; }
        .red { color: var(--메인); }
        .full { grid-column: span 2; } /* 주소 같이 긴 항목용 */

        .memo { background: #fff7ed; border-left: 4px solid #fb923c; padding: 10px; font-size: 12px; margin-top: 8px; border-radius: 4px; white-space: pre-wrap; line-height: 1.5; }
        
        .card-photo-tabs::-webkit-scrollbar, .photo-list::-webkit-scrollbar { height: 4px; }
        .card-photo-tabs::-webkit-scrollbar-thumb, .photo-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="auth-section">
        <h2>🔒 보안 수첩 접속</h2>
        <input type="password" id="pw" placeholder="비밀번호" onkeypress="if(event.key==='Enter') unlock()">
        <button onclick="unlock()">열기</button>
    </div>

    <div id="mainContent">
        <div class="sticky-header">
            <input type="text" id="searchInput" class="search-box" placeholder="이름 또는 소속 검색..." onkeyup="runSearch()">
        </div>
        <div id="list"></div>
    </div>

<script>
    let masterDB = [];

    function unlock() {
        if(document.getElementById('pw').value === "1234") {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            loadData();
        } else { alert("비밀번호 틀림"); }
    }

    function parseCSV(text) {
        const rows = [];
        let currRow = [], currCol = "", inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            const c = text[i];
            if (inQuotes && c === '"' && text[i+1] === '"') { currCol += '"'; i++; }
            else if (c === '"') inQuotes = !inQuotes;
            else if ((c === ',' || c === '\t') && !inQuotes) { currRow.push(currCol.trim()); currCol = ""; }
            else if ((c === '\n' || c === '\r') && !inQuotes) {
                if (currCol !== "" || currRow.length > 0) { currRow.push(currCol.trim()); rows.push(currRow); currCol = ""; currRow = []; }
            } else { currCol += c; }
        }
        if (currCol || currRow.length > 0) { currRow.push(currCol.trim()); rows.push(currRow); }
        return rows;
    }

    async function loadData() {
        try {
            const res = await fetch('인명.csv');
            const ab = await res.arrayBuffer();
            const text = new TextDecoder('utf-8').decode(ab);
            const rows = parseCSV(text);
            const header = rows[0].map(h => h.replace(/["']/g, '').trim());
            
            masterDB = rows.slice(1).map(r => {
                let obj = {};
                header.forEach((h, i) => obj[h] = r[i] || "");
                obj._imgs = [];
                obj._folders = new Set(['전체']);
                const name = obj['이름'] ? obj['이름'].trim() : "";
                if (obj['사진파일'] && name) {
                    obj['사진파일'].replace(/^"|"$/g, '').split(',').forEach(p => {
                        const path = p.trim().replace(/^"|"$/g, '');
                        if(path) {
                            const folder = path.includes('/') ? path.split('/')[0] : '기타';
                            obj._folders.add(folder);
                            obj._imgs.push({ fullPath: `img/${name}/${path}`, folder: folder });
                        }
                    });
                }
                obj._currentTab = '전체'; 
                return obj;
            });
            runSearch();
        } catch (e) { alert("데이터 로드 실패"); }
    }

    function setCardTab(idx, folder) {
        masterDB[idx]._currentTab = folder;
        renderCardPhotos(idx);
    }

    function renderCardPhotos(idx) {
        const p = masterDB[idx];
        const tabContainer = document.getElementById(`tabs-${idx}`);
        const photoContainer = document.getElementById(`photos-${idx}`);
        
        tabContainer.innerHTML = Array.from(p._folders).map(f => `
            <button class="p-btn ${p._currentTab === f ? 'active' : ''}" onclick="setCardTab(${idx}, '${f}')">${f}</button>
        `).join('');

        const displayImgs = p._currentTab === '전체' ? p._imgs : p._imgs.filter(img => img.folder === p._currentTab);
        photoContainer.innerHTML = displayImgs.map(img => `
            <div class="photo-item"><img src="${img.fullPath}" onerror="this.src='https://via.placeholder.com/120?text=로드실패'"></div>
        `).join('');
    }

    function runSearch() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const container = document.getElementById('list');
        const filtered = masterDB.filter(p => (p['이름']||'').toLowerCase().includes(term) || (p['소속']||'').toLowerCase().includes(term));
        
        container.innerHTML = filtered.map(p => {
            const realIdx = masterDB.indexOf(p);
            return `
                <div class="card">
                    <div class="name-row"><span class="name">${p['이름']}</span><span class="sub-text">${p['소속']}</span></div>
                    <div class="card-photo-tabs" id="tabs-${realIdx}"></div>
                    <div class="photo-list" id="photos-${realIdx}"></div>
                    
                    <div class="grid">
                        <div class="box"><span class="label">연락처</span><span class="val">${p['연락처'] || '-'}</span></div>
                        <div class="box"><span class="label">사이즈</span><span class="val red">${p['사이즈'] || '-'}</span></div>
                        <div class="box"><span class="label">호감도</span><span class="val red">${p['나에대한 호감도'] || '-'}</span></div>
                        <div class="box"><span class="label">가성비</span><span class="val">${p['가성비'] || '-'}</span></div>
                        <div class="box"><span class="label">생일</span><span class="val">${p['생년월일'] || '-'}</span></div>
                        <div class="box"><span class="label">최근수위</span><span class="val">${p['최근수위'] || '-'}</span></div>
                        <div class="box full"><span class="label">주소</span><span class="val">${p['주소'] || '-'}</span></div>
                        <div class="box full"><span class="label">특이사항</span><span class="val">${p['특이반응'] || '-'}</span></div>
                    </div>

                    <div class="memo"><strong>📝 공략계획:</strong><br>${p['공략계획'] || '-'}</div>
                    <div class="memo" style="background:#f0f9ff; border-left-color:#0ea5e9;"><strong>🤝 공통화제:</strong><br>${p['공통화제'] || '-'}</div>
                </div>`;
        }).join('');
        filtered.forEach(p => renderCardPhotos(masterDB.indexOf(p)));
    }
</script>
</body>
</html>
