<div id="mainContent">
    <div class="filter-bar" id="filterBar">
        <button class="f-btn active" onclick="filter('전체')">전체보기</button>
    </div>
    
    <div style="padding: 10px 0;">
        <input type="text" id="searchInput" placeholder="이름 또는 소속 검색..." 
               style="width: 100%; box-sizing: border-box; margin-bottom: 0;"
               onkeyup="searchData()">
    </div>

    <div id="list"></div>
</div>

<script>
    // 기존 변수들...
    let currentFilter = '전체';

    // ... 기존 unlock, parseCSV, loadData 함수 동일 ...

    // 검색 기능 함수
    function searchData() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        
        // 현재 선택된 폴더 필터 + 검색어 필터 중복 적용
        const filtered = masterDB.filter(p => {
            const matchesFilter = currentFilter === '전체' || p._imgs.some(i => i.folder === currentFilter);
            const matchesSearch = (p['이름'] || '').toLowerCase().includes(term) || 
                                 (p['소속'] || '').toLowerCase().includes(term);
            return matchesFilter && matchesSearch;
        });
        
        renderList(filtered, currentFilter);
    }

    // 기존 filter 함수 수정
    function filter(fName) {
        currentFilter = fName; // 현재 필터 상태 저장
        document.querySelectorAll('.f-btn').forEach(b => 
            b.classList.toggle('active', b.innerText === fName || (fName === '전체' && b.innerText === '전체보기'))
        );
        searchData(); // 검색어와 필터를 동시에 고려하여 렌더링
    }
</script>
