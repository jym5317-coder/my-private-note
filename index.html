<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개인 보관함</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; display: none; } /* 인증 전에는 숨김 */
        .card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 5px; }
        .info-item { margin: 10px 0; font-size: 14px; }
        .label { font-weight: bold; color: #555; width: 80px; display: inline-block; }
    </style>
</head>
<body>

<script>
    // 🔓 나만 아는 비밀번호를 설정하세요 (예: 1234)
    const myPassword = "1234"; 
    
    const input = prompt("비밀번호를 입력해야 접속할 수 있습니다.");
    
    if (input === myPassword) {
        // 비밀번호가 맞으면 화면을 보여줌
        window.onload = function() {
            document.getElementById('mainContent').style.display = 'block';
        };
    } else {
        alert("비밀번호가 틀렸습니다.");
        document.body.innerHTML = "<h2 style='text-align:center; margin-top:50px;'>접근 권한이 없습니다.</h2>";
    }
</script>

<div class="container" id="mainContent">
    <h2>🔒 개인 메모장</h2>
    
    <div class="card">
        <div class="info-item"><span class="label">항목:</span> 성격의 성격</div>
        <div class="info-item"><span class="label">내용:</span> 일화 및 사적인 기록들...</div>
    </div>

    <div class="card">
        <div class="info-item"><span class="label">기타:</span> 신체 사이즈 및 민감 정보</div>
        <div class="info-item"><span class="label">메모:</span> 발사이즈 270 / 상의 100 등</div>
<div class="container" id="mainContent">
    <h2>🔒 개인 메모장</h2>,
    
    <div class="card">
        <div class="info-item"><span class="label">항목:</span> 성격의 성격</div>
        <div class="info-item"><span class="label">내용:</span> 일화 및 사적인 기록들...</div>
    </div>

    <div class="card">
        <div class="info-item"><span class="label">기타:</span> 신체 사이즈 및 민감 정보</div>
        <div class="info-item"><span class="label">메모:</span> 발사이즈 270 / 상의 100 등</div>
    </div>
</div>

</body>
</html>
