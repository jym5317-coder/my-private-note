<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART 인물 전략 수첩</title>
    <style>
        :root { --primary: #e61e43; --secondary: #1d2b4f; --bg: #f0f2f5; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        #auth-section { margin-top: 150px; text-align: center; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #auth-section input { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 200px; }
        #auth-section button { padding: 12px 25px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; }

        #main-content { display: none; width: 100%; max-width: 500px; }
        .header-title { color: var(--primary); font-size: 24px; font-weight: bold; text-align: center; margin-bottom: 15px; }
        .search-bar { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; box-sizing: border-box; }
        
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 6px solid var(--primary); padding: 15px; position: relative; }
        .profile-header { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .profile-img { width: 75px; height: 75px; border-radius: 50%; background: #eee; object-fit: cover; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .profile-info h2 { margin: 0; font-size: 22px; color: #333; }
        .profile-info p { margin: 3px 0 0; color: #666; font-size: 14px; font-weight: bold; }
        
        .photo-btn { width: 100%; background: #f8f9fa; border: 1px solid #eee; padding: 10px; border-radius: 10px; cursor: pointer; color: #555; font-size: 14px; margin: 10px 0; font-weight: bold; }
        .photo-area { display: none; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .photo-area img { width: 140px; height: 190px; object-fit: cover; border-radius: 10px; flex-shrink: 0; border: 1px solid #ddd; }

        .section-title { font-size: 14px; font-weight: bold; color: #2d5af0; margin: 15px 0 8px; border-left: 4px solid #2d5af0; padding-left: 8px; }
        .data-table { background: #f8faff; border-radius: 12px; padding: 12px; font-size: 13px; }
        .data-row { display: grid; grid-template-columns: 90px 1fr; margin-bottom: 6px; border-bottom: 1px solid #eef2f8; padding-bottom: 4px; }
        .label { color: #777; font-weight: bold; }
        .val { color: #333; }
        .val-red { color: #e61e43; font-weight: bold; }
        .val-blue { color: #2d5af0; font-weight: bold; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 12px; border-radius: 10px; border: none; color: white; font-weight: bold; text-align: center; cursor: pointer; text-decoration: none; font-size: 14px; display: block; }
        .btn-call { background: #2d5af0; }
        .btn-notion { background: #1d2b4f; }
    </style>
</head>
<body>

    <div id="auth-section">
        <h2>🔒 SMART 인물 전략 수첩</h2>
        <input type="password" id="pw-input" placeholder="비밀번호 입력..." onkeypress="if(event.keyCode==13) checkPw()">
        <button onclick="checkPw()">확인</button>
    </div>

    <div id="main-content">
        <div class="header-title">🔒 SMART 인물 전략 수첩</div>
        <input type="text" class="search-bar" id="search" placeholder="이름, 소속 검색..." onkeyup="filterCards()">
        <div id="container">데이터 로드 중...</div>
    </div>

    <script>
        function checkPw() {
            if(document.getElementById('pw-input').value === '1234') { // <--- 비밀번호
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                loadData();
            } else { alert('틀렸습니다.'); }
        }

        function loadData() {
            fetch('인명.csv')
                .then(res => res.text())
                .then(data => {
                    const rows = data.split('\n').filter(r => r.trim()).slice(1);
                    const container = document.getElementById('container');
                    container.innerHTML = '';

                    rows.forEach(row => {
                        const col = row.split(',').map(c => c.trim() || '-');
                        // 엑셀 순서: 1이름, 2소속, 3연락처, 4사진, 5생일, 7사이즈, 11첫스킨십, 14보유자료, 19주의사항, 22접근시간, 23가성비, 24호감도
                        const name=col[1], team=col[2], phone=col[3], photos=col[4], size=col[7], skin=col[11], items=col[14], warn=col[19], time=col[22], price=col[23], like=col[24], diff=col[28];

                        let photoImgs = '';
                        if(photos !== '-') {
                            photos.split(';').forEach(p => {
                                photoImgs += `<img src="img/${name}/${p.trim()}" onerror="this.style.display='none'">`;
                            });
                        }

                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="profile-header">
                                <img class="profile-img" src="img/${name}/face.jpg" onerror="this.src='https://via.placeholder.com/100'">
                                <div class="profile-info">
                                    <h2>${name} <span style="color:#f39c12; font-size:14px;">★ ${like}</span></h2>
                                    <p>${team} | <span class="val-red">${size}</span></p>
                                </div>
                            </div>
                            <button class="photo-btn" onclick="togglePhoto(this)">▼ 사진 보기 (몸매 확인)</button>
                            <div class="photo-area">${photoImgs || '사진 등록 필요'}</div>
                            
                            <div class="section-title">⏱ 공략 현황</div>
                            <div class="data-table">
                                <div class="data-row"><div class="label">접근/연락</div><div class="val-blue">${time}</div></div>
                                <div class="data-row"><div class="label">가성비</div><div class="val-blue">${price}</div></div>
                                <div class="data-row"><div class="label">스킨십</div><div class="val-red">${skin}</div></div>
                                <div class="data-row"><div class="label">난이도</div><div class="val">${diff}</div></div>
                            </div>

                            <div class="section-title">⚠️ 주의 및 전리품</div>
                            <div class="data-table">
                                <div class="data-row"><div class="label">보유자료</div><div class="val">${items}</div></div>
                                <div class="data-row"><div class="label">주의사항</div><div class="val-red">${warn}</div></div>
                            </div>

                            <div class="btn-group">
                                <a href="tel:${phone}" class="btn btn-call">📞 전화하기</a>
                                <a href="${col[17] || '#'}" class="btn btn-notion">📔 노션링크</a>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                });
        }

        function togglePhoto(btn) {
            const area = btn.nextElementSibling;
            area.style.display = (area.style.display === 'flex') ? 'none' : 'flex';
        }

        function filterCards() {
            const val = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(val) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
