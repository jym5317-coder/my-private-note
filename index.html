<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 SMART 인물 전략 수첩 V4.0</title>
    <style>
        :root { --primary: #e11d48; --accent: #2563eb; --strategy: #0891b2; --bg: #f1f5f9; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; color: #1e293b; }
        #mainContent { max-width: 600px; margin: 0 auto; display: none; }
        .header { text-align: center; margin-bottom: 20px; color: var(--primary); }
        .search-box { width: 100%; padding: 15px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 16px; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        
        .card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 25px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-top: 6px solid var(--primary); position: relative; }
        .difficulty-badge { position: absolute; top: 15px; right: 15px; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; background: #f1f5f9; color: #475569; }
        
        .card-top { display: flex; align-items: center; margin-bottom: 18px; gap: 15px; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; background: #eee; border: 2px solid #fff; }
        .name-info h3 { margin: 0; font-size: 22px; }
        .rating-star { color: #f59e0b; font-size: 14px; }

        .section-title { font-size: 12px; font-weight: 900; color: var(--strategy); margin: 15px 0 8px 5px; display: flex; align-items: center; gap: 5px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: #cffafe; }

        .info-grid { display: grid; grid-template-columns: 1fr; gap: 6px; background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .info-item { display: flex; border-bottom: 1px dashed #e2e8f0; padding-bottom: 4px; }
        .info-item:last-child { border-bottom: none; }
        .label { font-size: 11px; font-weight: 800; color: #64748b; width: 100px; flex-shrink: 0; }
        .value { font-size: 13.5px; color: #334155; white-space: pre-wrap; flex-grow: 1; }
        
        .imp-val { color: var(--primary); font-weight: bold; }
        .highlight { color: var(--strategy); font-weight: bold; }

        .live-memo { margin-top: 15px; padding: 12px; background: #fffbeb; border-radius: 12px; border: 1px solid #fef3c7; }
        .memo-area { width: 100%; height: 60px; border: none; background: transparent; font-size: 14px; resize: none; outline: none; margin-top: 5px; color: #92400e; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { text-align: center; padding: 12px; border-radius: 10px; font-weight: bold; text-decoration: none; font-size: 14px; color: white; }
    </style>
</head>
<body>

<script>
    const csvUrl = "인명.csv"; 
    const myPassword = "1234"; 
    let privateData = [];

    const pwd = prompt("관리자 암호:");
    if (pwd !== myPassword) { alert("권한 없음"); window.stop(); }

    function parseCSV(text) {
        const rows = [];
        let cur = ""; let line = []; let inQ = false;
        for (let i=0; i<text.length; i++) {
            const c = text[i];
            if (c === '"') inQ = !inQ;
            else if (c === ',' && !inQ) { line.push(cur.trim()); cur = ""; }
            else if ((c === '\n' || c === '\r') && !inQ) {
                if (cur || line.length > 0) { line.push(cur.trim()); rows.push(line); }
                cur = ""; line = [];
            } else cur += c;
        }
        if (cur || line.length > 0) { line.push(cur.trim()); rows.push(line); }
        return rows;
    }

    async function loadData() {
        try {
            const res = await fetch(csvUrl + "?v=" + new Date().getTime());
            const text = await res.text();
            const rows = parseCSV(text).slice(1);
            
            privateData = rows.map(cols => ({
                id: cols[0], name: cols[1], role: cols[2], phone: cols[3], photo: cols[4],
                birth: cols[5], address: cols[6], size: cols[7],
                reason: cols[8], level: cols[9], meetDate: cols[10], 
                skinship: cols[11], sexDate: cols[12], lastAction: cols[13],
                media: cols[14], special: cols[15], cost: cols[16],
                notion: cols[17], memo: cols[18], taboo: cols[19], tastes: cols[20],
                interval: cols[21], bestTime: cols[22], roi: cols[23], 
                rating: cols[24], commonTopic: cols[25], enemy: cols[26],
                currentWorry: cols[27], difficulty: cols[28]
            })).filter(p => p.name);

            render(privateData);
            document.getElementById('mainContent').style.display = 'block';
        } catch(e) { alert("데이터 로드 실패"); }
    }

    function render(data) {
        const container = document.getElementById('listContainer');
        container.innerHTML = data.map(p => {
            const saved = localStorage.getItem('memo_' + p.id) || "";
            return `
            <div class="card">
                <div class="difficulty-badge">난이도: ${p.difficulty || '미정'}</div>
                <div class="card-top">
                    <img src="${p.photo || 'https://via.placeholder.com/100'}" class="profile-img">
                    <div class="name-info">
                        <h3>${p.name} <span class="rating-star">★ ${p.rating || '0'}</span></h3>
                        <p>${p.role} | ${p.size || '-'}</p>
                    </div>
                </div>

                <div class="section-title">⏱️ 공략 타이밍 및 효율</div>
                <div class="info-grid">
                    <div class="info-item"><span class="label">연락 주기(공백기)</span><span class="value highlight">${p.interval || '-'}</span></div>
                    <div class="info-item"><span class="label">접근 가능 시간</span><span class="value">${p.bestTime || '-'}</span></div>
                    <div class="info-item"><span class="label">투자대비 성과</span><span class="value">${p.roi || '-'}</span></div>
                </div>

                <div class="section-title">💬 대화 전략 및 주변 상황</div>
                <div class="info-grid">
                    <div class="info-item"><span class="label">공통 화제</span><span class="value highlight">${p.commonTopic || '-'}</span></div>
                    <div class="info-item"><span class="label">최근 고민</span><span class="value">${p.currentWorry || '-'}</span></div>
                    <div class="info-item"><span class="label">경계 인물</span><span class="value" style="color:red;">${p.enemy || '-'}</span></div>
                </div>

                <div class="section-title">🔞 관계 및 전리품 기록</div>
                <div class="info-grid">
                    <div class="info-item"><span class="label">스킨십/정복</span><span class="value imp-val">${p.skinship || '-'} / ${p.sexDate || '미달성'}</span></div>
                    <div class="info-item"><span class="label">보유 자료</span><span class="value" style="color:var(--accent); font-weight:bold;">${p.media || '없음'}</span></div>
                    <div class="info-item"><span class="label">특이 취향</span><span class="value">${p.special || '-'}</span></div>
                </div>

                <div class="live-memo">
                    <div class="label" style="color:#92400e;">📍 실시간 반응 피드백</div>
                    <textarea class="memo-area" oninput="localStorage.setItem('memo_${p.id}', this.value)">${saved}</textarea>
                </div>

                <div class="btn-group">
                    <a href="tel:${p.phone}" class="btn" style="background:var(--accent)">📞 전화</a>
                    <a href="${p.notion}" target="_blank" class="btn" style="background:#0f172a">📔 상세 노션</a>
                </div>
            </div>`;
        }).join('');
    }

    function search() {
        const q = document.getElementById('search').value.toLowerCase();
        render(privateData.filter(p => p.name.includes(q) || p.commonTopic.includes(q) || p.currentWorry.includes(q)));
    }

    document.addEventListener("DOMContentLoaded", loadData);
</script>

<div id="mainContent">
    <div class="header"><h2>🔒 SMART 인물 전략 수첩</h2></div>
    <input type="text" id="search" class="search-box" placeholder="이름, 대화주제, 고민 검색..." onkeyup="search()">
    <div id="listContainer"></div>
</div>
</body>
</html>
