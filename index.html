<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인원관리 앱</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script>
    // ===== 앱 시작 =====
    let csvData = [];
    let currentPersonIndex = 0;
    let photos = [];
    let photoIndex = 0;

    async function init() {
      try {
        // 로컬 CSV 파일 로드 (GitHub에 업로드된 파일)
        const res = await fetch('인명.csv');
        const text = await res.text();
        
        // Papa Parse로 CSV 파싱
        Papa.parse(text, {
          header: true,
          skipEmptyLines: true,
          complete: (results) => {
            console.log('CSV 파싱 완료:', results.data);
            csvData = results.data.filter(row => row.아이디 && row.아이디.trim());
            
            if (csvData.length > 0) {
              loadPersonPhotos(0);
              render();
            } else {
              document.getElementById('root').innerHTML = '<div class="flex items-center justify-center h-screen"><p class="text-red-600">데이터가 없습니다</p></div>';
            }
          },
          error: (error) => {
            console.error('CSV 파싱 에러:', error);
            document.getElementById('root').innerHTML = `<div class="flex items-center justify-center h-screen"><p class="text-red-600">CSV 파일을 읽을 수 없습니다: ${error.message}</p></div>`;
          }
        });
      } catch (e) {
        console.error('파일 로드 에러:', e);
        document.getElementById('root').innerHTML = `<div class="flex items-center justify-center h-screen"><p class="text-red-600">인명.csv 파일을 찾을 수 없습니다</p></div>`;
      }
    }

    function loadPersonPhotos(idx) {
      currentPersonIndex = idx;
      const person = csvData[idx];
      const photoPath = person?.사진 || '';
      
      if (photoPath && photoPath.trim()) {
        // | 로 분리된 경로를 처리
        photos = photoPath
          .split('|')
          .map(p => p.trim())
          .filter(Boolean)
          .map(p => `img/${person.아이디}/${p}`); // 상대 경로
      } else {
        photos = [];
      }
      
      photoIndex = 0;
    }

    function render() {
      const person = csvData[currentPersonIndex];
      
      let html = `
        <div class="min-h-screen bg-gray-50 p-4">
          <div class="max-w-6xl mx-auto">
            <!-- 상단 탭 바 -->
            <div class="mb-6">
              <div class="flex gap-2 flex-wrap bg-white p-4 rounded-lg shadow overflow-x-auto">
      `;
      
      // 탭 렌더링
      csvData.forEach((person, idx) => {
        const isActive = currentPersonIndex === idx;
        html += `
          <button 
            onclick="selectPerson(${idx})"
            class="px-4 py-2 rounded-full font-semibold transition flex-shrink-0 ${
              isActive
                ? 'bg-blue-500 text-white'
                : 'bg-gray-200 text-gray-800 hover:bg-gray-300'
            }"
          >
            ${person.아이디}
          </button>
        `;
      });
      
      html += `
              </div>
            </div>

            <!-- 메인 카드 -->
            <div class="bg-white rounded-lg shadow-lg p-6">
              <!-- 제목 -->
              <div class="mb-6 pb-4 border-b">
                <h2 class="text-2xl font-bold">
                  ${person.아이디}
                  ${person.항목1 && person.항목1 !== person.아이디 ? `<span class="text-gray-600"> | ${person.항목1}</span>` : ''}
                </h2>
              </div>

              <!-- 사진 슬라이더 -->
              <div class="mb-8">
                <div class="bg-gray-100 p-4 rounded-lg">
                  <div class="flex gap-3 overflow-x-auto pb-4">
      `;
      
      // 5개 사진 카드
      for (let i = 0; i < 5; i++) {
        const photoUrl = photos[photoIndex + i];
        html += `
          <div class="w-48 h-48 bg-gray-300 rounded-lg flex-shrink-0 overflow-hidden border-2 border-gray-400">
            ${photoUrl ? `
              <img 
                src="${photoUrl}" 
                alt="사진 ${photoIndex + i + 1}" 
                class="w-full h-full object-cover"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
              />
            ` : ''}
            <div class="w-full h-full flex items-center justify-center text-gray-600 bg-gray-300" style="display: ${photoUrl ? 'none' : 'flex'}">
              <span class="text-center text-sm">사진 없음</span>
            </div>
          </div>
        `;
      }
      
      html += `
                  </div>

                  <!-- 네비게이션 -->
                  <div class="flex justify-between items-center mt-4">
                    <button
                      onclick="prevPhoto()"
                      ${photoIndex === 0 ? 'disabled' : ''}
                      class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500 disabled:bg-gray-300 disabled:cursor-not-allowed"
                    >
                      ← 이전
                    </button>
                    <span class="text-gray-600 text-sm">
                      ${photos.length > 0 ? `${Math.min(photoIndex + 5, photos.length)} / ${photos.length}` : '사진 없음'}
                    </span>
                    <button
                      onclick="nextPhoto()"
                      ${photoIndex >= photos.length - 5 || photos.length === 0 ? 'disabled' : ''}
                      class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500 disabled:bg-gray-300 disabled:cursor-not-allowed"
                    >
                      다음 →
                    </button>
                  </div>
                </div>
              </div>

              <!-- 데이터 표시 (항목1~항목8) -->
              <div class="mb-8">
                <h3 class="text-lg font-semibold mb-4 text-gray-800">기본 정보</h3>
                <div class="grid grid-cols-2 gap-4">
      `;
      
      // 항목1~8 표시
      for (let i = 1; i <= 8; i++) {
        const key = `항목${i}`;
        const value = person[key];
        
        if (value && String(value).trim()) {
          html += `
            <div class="p-4 bg-gray-50 rounded-lg border border-gray-200">
              <span class="font-semibold text-gray-700">${key}:</span>
              <p class="text-gray-900 mt-1">${value}</p>
            </div>
          `;
        }
      }
      
      html += `
                </div>
              </div>

              <!-- 하단 3개 섹션 -->
              <div class="space-y-4">
      `;
      
      // 주의사항
      if (person.주의사항 && String(person.주의사항).trim()) {
        html += `
          <div class="border-l-4 border-red-500 bg-red-50 p-4 rounded">
            <div class="flex items-start gap-3">
              <span class="text-xl">⚠️</span>
              <div>
                <h4 class="font-semibold text-red-800">주의사항</h4>
                <p class="text-red-700 mt-1 whitespace-pre-wrap">${person.주의사항}</p>
              </div>
            </div>
          </div>
        `;
      }
      
      // 공략계획
      if (person.공략계획 && String(person.공략계획).trim()) {
        html += `
          <div class="border-l-4 border-amber-500 bg-amber-50 p-4 rounded">
            <div class="flex items-start gap-3">
              <span class="text-xl">📋</span>
              <div>
                <h4 class="font-semibold text-amber-800">공략계획</h4>
                <p class="text-amber-700 mt-1 whitespace-pre-wrap">${person.공략계획}</p>
              </div>
            </div>
          </div>
        `;
      }
      
      // 공통화제
      if (person.공통화제 && String(person.공통화제).trim()) {
        html += `
          <div class="border-l-4 border-blue-500 bg-blue-50 p-4 rounded">
            <div class="flex items-start gap-3">
              <span class="text-xl">❤️</span>
              <div>
                <h4 class="font-semibold text-blue-800">공통화제</h4>
                <p class="text-blue-700 mt-1 whitespace-pre-wrap">${person.공통화제}</p>
              </div>
            </div>
          </div>
        `;
      }
      
      // 3개 모두 비어있으면
      if ((!person.주의사항 || !String(person.주의사항).trim()) &&
          (!person.공략계획 || !String(person.공략계획).trim()) &&
          (!person.공통화제 || !String(person.공통화제).trim())) {
        html += `
          <div class="text-center text-gray-500 py-8">
            <p>추가 정보 없음</p>
          </div>
        `;
      }
      
      html += `
              </div>
            </div>

            <!-- 디버그 정보 -->
            <div class="mt-8 p-4 bg-gray-100 rounded text-xs text-gray-600">
              <p>로드된 인명: ${csvData.length}명 | 현재: ${person.아이디} | 사진: ${photos.length}개</p>
            </div>
          </div>
        </div>
      `;
      
      document.getElementById('root').innerHTML = html;
    }

    function selectPerson(idx) {
      loadPersonPhotos(idx);
      render();
    }

    function prevPhoto() {
      photoIndex = Math.max(0, photoIndex - 1);
      render();
    }

    function nextPhoto() {
      photoIndex = Math.min(Math.max(0, photos.length - 5), photoIndex + 1);
      render();
    }

    // 앱 시작
    window.addEventListener('load', init);
  </script>
</body>
</html>
