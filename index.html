<script>
    // ... 기존 파싱 로직 동일 ...

    function render(data) {
        const container = document.getElementById('listContainer');
        container.innerHTML = data.map(p => {
            const liveMemo = localStorage.getItem('memo_' + p.id) || "";
            // 아가씨(미혼) 여부 판단 (shinsang에 '유부'가 없는 경우 등)
            const isSingle = !p.shinsang.includes('유부');
            const isTarget = (p.name === "김보라" || p.name === "손경옥");

            return `
            <div class="card ${p.isTarget ? 'target' : ''}" style="${isSingle ? 'border-left: 6px solid #10b981;' : ''}">
                ${p.isTarget ? `<div class="target-badge">🔥 집중 공략: ${p.name}</div>` : ''}
                ${isSingle ? `<div style="position:absolute; top:0; left:0; background:#10b981; color:white; padding:2px 10px; font-size:10px; border-bottom-right-radius:10px;">✨ 미혼(아가씨) 관리</div>` : ''}
                
                <div class="card-top">
                    <img src="${p.photo}" class="profile-img" onerror="this.src='https://via.placeholder.com/100?text=No+Img'">
                    <div class="name-info">
                        <h3>${p.name} ${isSingle ? '<small style="font-size:12px; color:#10b981;">(Single)</small>' : ''}</h3>
                        <div class="status-tag">${p.role || '상태 미설정'}</div>
                    </div>
                </div>

                <div class="info-grid">
                    <div class="info-item"><span class="label">첫빠구리 일자</span><span class="value" style="color:#e11d48;">${p.sex || '진도 미달성'}</span></div>
                    <div class="info-item"><span class="label">사이즈/성향</span><span class="value">${p.size} / ${p.trait}</span></div>
                    <div class="info-item"><span class="label">경쟁자/남친유무</span><span class="value">${p.shinsang}</span></div>
                </div>

                <div class="strategy-box" style="background:#f0fdf4; border:1px solid #dcfce7;">
                    <div class="section-title" style="margin:0 0 10px 0; color:#15803d;">
                        🎯 ${p.name === "손경옥" ? '최종 정복(입싸) 전략' : '진입 및 스킨십 전략'}
                    </div>
                    <div class="strategy-text">
                        ${p.name === "손경옥" ? 
                            "지배력 강화 필요. 사정 전 압박감을 주며 복종 유도." : 
                            (p.memo || '명분을 만들어 1:1 술자리 유도 후 스킨십 시도')}
                    </div>
                </div>

                <div class="section-title">📍 실시간 호감도 및 반응 기록</div>
                <textarea class="memo-area" placeholder="멘트에 대한 반응, 스킨십 허용 범위 등 기록..." oninput="localStorage.setItem('memo_${p.id}', this.value)">${liveMemo}</textarea>

                <a href="tel:${p.phone}" class="btn-call" style="background:#10b981;">📞 아가씨에게 연락하기</a>
            </div>
            `;
        }).join('');
    }
</script>
