<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>인물 공략 수첩 V2</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; padding: 20px; }
        .card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .name { font-size: 1.2em; font-weight: bold; color: #1a73e8; cursor: pointer; }
        .details { display: none; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .info-grid { display: grid; grid-template-columns: 100px 1fr; gap: 5px; font-size: 0.9em; }
        .label { color: #666; font-weight: bold; }
        .photo-container { margin-top: 10px; display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .photo-container img { width: 150px; height: 200px; object-fit: cover; border-radius: 5px; border: 1px solid #ddd; cursor: pointer; }
    </style>
</head>
<body>

    <h2>👤 인물 공략 수첩 (경로 자동화 버전)</h2>
    <div id="container">데이터를 불러오는 중...</div>

    <script>
        // CSV 파일을 읽어오는 함수
        fetch('인명.csv')
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n').slice(1); // 첫 줄(헤더) 제외
                const container = document.getElementById('container');
                container.innerHTML = '';

                rows.forEach(row => {
                    if (!row.trim()) return;
                    const cols = row.split(',');
                    
                    // 인덱스: 이름(1번), 사진파일명(4번) - 사장님 CSV 순서에 맞춰 자동 조절
                    const name = cols[1]?.trim();
                    const photoFiles = cols[4]?.trim(); 

                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    // 사진 경로 자동 생성 마법 부분
                    let photoHtml = '';
                    if (photoFiles) {
                        const fileList = photoFiles.split(';'); // 쉼표나 세미콜론 구분
                        fileList.forEach(file => {
                            const fileName = file.trim();
                            if(fileName) {
                                // 경로 조립: img / 이름 / 파일명
                                const finalPath = `img/${name}/${fileName}`;
                                photoHtml += `<img src="${finalPath}" onclick="window.open('${finalPath}')" onerror="this.style.display='none'" title="${fileName}">`;
                            }
                        });
                    }

                    card.innerHTML = `
                        <div class="name" onclick="toggleDetails(this)">+ ${name} (${cols[2] || '소속없음'})</div>
                        <div class="details">
                            <div class="info-grid">
                                <div class="label">연락처</div><div>${cols[3] || '-'}</div>
                                <div class="label">생년월일</div><div>${cols[5] || '-'}</div>
                                <div class="label">특이사항</div><div>${cols[15] || '-'}</div>
                                <div class="label">공략계획</div><div>${cols[18] || '-'}</div>
                            </div>
                            <div class="photo-container">${photoHtml || '사진 없음'}</div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(err => {
                document.getElementById('container').innerHTML = 'CSV 파일을 찾을 수 없거나 형식이 잘못되었습니다.';
                console.error(err);
            });

        function toggleDetails(el) {
            const details = el.nextElementSibling;
            details.style.display = details.style.display === 'block' ? 'none' : 'block';
            el.innerText = details.style.display === 'block' ? '- ' + el.innerText.substring(2) : '+ ' + el.innerText.substring(2);
        }
    </script>
</body>
</html>
