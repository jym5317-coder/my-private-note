<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 스마트 인물 수첩 (데이터 자동보정)</title>
    <style>
        :root { --primary-color: #e11d48; --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f1f5f9; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); margin: 0; padding: 10px; color: var(--text-main); }
        #mainContent { max-width: 600px; margin: 0 auto; display: none; }
        .header { text-align: center; margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #334155; }
        .search-box { width: 100%; padding: 15px; border: 2px solid #334155; border-radius: 12px; font-size: 16px; margin-bottom: 20px; outline: none; box-sizing: border-box; background: #1e293b; color: white; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 15px; margin-bottom: 20px; border-left: 6px solid var(--primary-color); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        .card-top { display: flex; align-items: center; margin-bottom: 15px; gap: 15px; }
        .profile-img { width: 85px; height: 85px; border-radius: 14px; object-fit: cover; background: #334155; border: 2px solid #475569; }
        .name-info h3 { margin: 0; font-size: 22px; color: #fb7185; }
        .name-info p { margin: 5px 0 0; font-size: 14px; color: #94a3b8; font-weight: bold; }
        .info-grid { display: grid; grid-template-columns: 1fr; gap: 6px; background: #0f172a; padding: 12px; border-radius: 10px; }
        .info-item { display: flex; align-items: flex-start; padding: 4px 0; border-bottom: 1px solid #1e293b; }
        .label { font-size: 12px; font-weight: 800; color: #fb7185; width: 90px; flex-shrink: 0; }
        .value { font-size: 14px; color: #cbd5e1; white-space: pre-wrap; flex-grow: 1; }
        .live-memo-container { margin-top: 15px; padding: 12px; background: #334155; border-radius: 10px; }
        .live-memo-area { width: 100%; height: 80px; border: none; background: transparent; font-size: 14px; resize: none; outline: none; color: #fff; }
    </style>
</head>
<body>

<script>
    const csvUrl = "인명.csv"; 
    const myPassword = "1234"; 
    let privateData = [];

    const login = prompt("접근 코드를 입력하세요.");
    if (login !== myPassword) {
        alert("접근 권한이 없습니다.");
        window.stop();
    } else {
        function parseCSV(text) {
            const rows = [];
            const lines = text.split(/\r?\n/);
            for (let line of lines) {
                if (line.trim()) {
                    // 콤마로 분리하되 따옴표 안의 콤마는 무시하는 로직
                    const cols = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                    if (cols) rows.push(cols.map(c => c.replace(/^"|"$/g, '').trim()));
                    else rows.push(line.split(',').map(c => c.trim()));
                }
            }
            return rows;
        }

        async function fetchExcelData() {
            const container = document.getElementById('listContainer');
            try {
                const response = await fetch(csvUrl);
                if (!response.ok) throw new Error("파일 로드 실패");
                
                const text = await response.text();
                const allRows = parseCSV(text);
                const dataRows = allRows.slice(1);

                privateData = dataRows.map((cols, idx) => {
                    // 데이터가 한 칸에 뭉쳐있을 경우를 대비해 순서를 유연하게 잡음
                    return {
                        id: cols[0] || 'idx_' + idx,
                        name: cols[1] || cols[0] || "이름없음", 
                        role: cols[2] || "",
                        phone: cols[3] || "",
                        photo: cols[4] || "",
                        size: cols[7] || "",
                        trait: cols[8] || "",
                        meetDate: cols[9] || "",
                        skinship: cols[10] || "",
                        sexDate: cols[11] || "",
                        action: cols[15] || ""
                    };
                }).filter(p => p.name && p.name !== "id"); 

                if (privateData.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding:20px;">표시할 명단이 없습니다.</div>';
                } else {
                    displayData(privateData);
                }
                document.getElementById('mainContent').style.display = 'block';
            } catch (error) {
                container.innerHTML = `<div style="text-align:center; padding:20px; color:#fb7185;">⚠️ 데이터 연결 오류: 인명.csv 파일을 확인하세요.</div>`;
                document.getElementById('mainContent').style.display = 'block';
            }
        }

        function displayData(data) {
            const container = document.getElementById('listContainer');
            container.innerHTML = data.map(p => `
                <div class="card">
                    <div class="card-top">
                        <img src="${p.photo}" class="profile-img" onerror="this.src='https://via.placeholder.com/100?text=NO+IMG'">
                        <div class="name-info">
                            <h3>${p.name}</h3>
                            <p>${p.role}</p>
                        </div>
                    </div>
                    <div class="info-grid">
                        <div class="info-item"><span class="label">첫시기</span><span class="value">${p.meetDate}</span></div>
                        <div class="info-item"><span class="label">첫스킨십</span><span class="value" style="color:#fb7185; font-weight:bold;">${p.skinship}</span></div>
                        <div class="info-item"><span class="label">첫빠구리</span><span class="value" style="color:#fb7185; font-weight:bold;">${p.sexDate}</span></div>
                        <div class="info-item"><span class="label">사이즈</span><span class="value">${p.size}</span></div>
                        <div class="info-item"><span class="label">특징</span><span class="value">${p.trait}</span></div>
                        <div class="info-item"><span class="label">행위 기록</span><span class="value">${p.action}</span></div>
                    </div>
                    <div class="live-memo-container">
                        <textarea class="live-memo-area" placeholder="현장 실시간 메모..." oninput="localStorage.setItem('m_'+'${p.id}', this.value)">${localStorage.getItem('m_'+p.id) || ""}</textarea>
                    </div>
                </div>`).join('');
        }

        window.filterData = function() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = privateData.filter(p => p.name.includes(query) || p.trait.includes(query));
            displayData(filtered);
        };

        document.addEventListener("DOMContentLoaded", fetchExcelData);
    }
</script>

<div id="mainContent">
    <div class="header"><h2>🔒 SMART 인물 수첩</h2></div>
    <input type="text" id="search" class="search-box" placeholder="이름, 특징 검색..." onkeyup="filterData()">
    <div id="listContainer"></div>
</div>

</body>
</html>
