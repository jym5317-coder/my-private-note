<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 스마트 인물 수첩 (전 항목 점검 완료)</title>
    <style>
        :root { --primary-color: #2563eb; --bg-color: #f8fafc; --point-color: #e11d48; --section-bg: #f1f5f9; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); margin: 0; padding: 10px; color: #1e293b; }
        #mainContent { max-width: 600px; margin: 0 auto; display: none; }
        .header { text-align: center; margin-bottom: 20px; }
        .search-box { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid var(--primary-color); }
        .card-top { display: flex; align-items: center; margin-bottom: 15px; gap: 15px; }
        .profile-img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; background: #eee; }
        .name-info h3 { margin: 0; font-size: 20px; color: #1e293b; }
        .name-info p { margin: 5px 0 0; font-size: 14px; color: #64748b; font-weight: 600; }
        
        .info-grid { display: grid; grid-template-columns: 1fr; gap: 6px; background: var(--section-bg); padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 10px; }
        .info-item { display: flex; border-bottom: 1px dashed #cbd5e1; padding-bottom: 4px; align-items: flex-start; }
        .info-item:last-child { border-bottom: none; }
        .label { font-size: 11px; font-weight: 800; color: #64748b; width: 90px; flex-shrink: 0; }
        .value { font-size: 13px; color: #334155; white-space: pre-wrap; word-break: break-all; flex-grow: 1; }
        
        .important-value { color: var(--point-color); font-weight: bold; }
        .section-title { font-size: 12px; font-weight: bold; color: var(--primary-color); margin: 10px 0 5px 5px; }

        .live-memo-container { margin-top: 15px; padding: 12px; background: #fffde7; border-radius: 10px; border: 1px solid #fde68a; }
        .live-memo-area { width: 100%; height: 80px; border: none; background: transparent; font-size: 14px; resize: none; outline: none; margin-top: 5px; }
        .btn-call { display: block; text-align: center; background: #2563eb; color: white; text-decoration: none; padding: 12px; border-radius: 10px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<script>
    const csvUrl = "인명.csv"; 
    const myPassword = "1234"; 
    let privateData = [];

    const login = prompt("비밀번호 입력:");
    if (login !== myPassword) {
        alert("접근 거부"); window.stop();
    } else {
        function parseCSV(text) {
            const rows = [];
            let currentLine = [];
            let currentToken = "";
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { currentLine.push(currentToken.trim()); currentToken = ""; }
                else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (currentToken || currentLine.length > 0) {
                        currentLine.push(currentToken.trim());
                        rows.push(currentLine);
                    }
                    currentToken = ""; currentLine = [];
                } else { currentToken += char; }
            }
            if (currentToken || currentLine.length > 0) { currentLine.push(currentToken.trim()); rows.push(currentLine); }
            return rows;
        }

        async function fetchExcelData() {
            try {
                const response = await fetch(csvUrl + "?v=" + new Date().getTime());
                const text = await response.text();
                const allRows = parseCSV(text);
                
                privateData = allRows.slice(1).map(cols => ({
                    id: cols[0] || "",
                    name: cols[1] || "",
                    role: cols[2] || "",
                    phone: cols[3] || "",
                    photo: cols[4] || "",
                    birth: cols[5] || "",      // 생년월일 (추가됨)
                    address: cols[6] || "",    // 주소 (추가됨)
                    size: cols[7] || "",
                    trait: cols[8] || "",
                    meetDate: cols[9] || "",
                    skinship: cols[10] || "",
                    sexDate: cols[11] || "",
                    school: cols[12] || "",    // 출신학교 (추가됨)
                    personal: cols[13] || "",  // 개인신상 (추가됨)
                    takenPhoto: cols[14] || "",// 찍은사진 (추가됨)
                    action: cols[15] || "",
                    memo: cols[16] || "",
                    notion: cols[17] || "",
                    tastes: cols[18] || "",   
                    interest: cols[19] || "", 
                    taboo: cols[20] || "",    
                    family: cols[21] || ""    
                })).filter(p => p.name); 

                displayData(privateData);
                document.getElementById('mainContent').style.display = 'block';
            } catch (error) { alert("데이터 로드 실패"); }
        }

        function displayData(data) {
            const container = document.getElementById('listContainer');
            container.innerHTML = data.map(p => {
                const savedMemo = localStorage.getItem('memo_' + p.id) || "";
                return `
                <div class="card">
                    <div class="card-top">
                        <img src="${p.photo}" class="profile-img" onerror="this.src='https://via.placeholder.com/100?text=No+Photo'">
                        <div class="name-info"><h3>${p.name}</h3><p>${p.role}</p></div>
                    </div>

                    <div class="section-title">👤 기본 신상 정보</div>
                    <div class="info-grid">
                        ${p.phone ? `<div class="info-item"><span class="label">연락처</span><span class="value">${p.phone}</span></div>` : ''}
                        ${p.birth ? `<div class="info-item"><span class="label">생년월일</span><span class="value">${p.birth}</span></div>` : ''}
                        ${p.school ? `<div class="info-item"><span class="label">출신학교</span><span class="value">${p.school}</span></div>` : ''}
                        ${p.address ? `<div class="info-item"><span class="label">주소</span><span class="value">${p.address}</span></div>` : ''}
                        ${p.personal ? `<div class="info-item"><span class="label">개인신상</span><span class="value">${p.personal}</span></div>` : ''}
                    </div>

                    <div class="section-title">💘 관계 및 특징</div>
                    <div class="info-grid">
                        ${p.size ? `<div class="info-item"><span class="label">사이즈</span><span class="value">${p.size}</span></div>` : ''}
                        ${p.meetDate ? `<div class="info-item"><span class="label">처음만난시기</span><span class="value">${p.meetDate}</span></div>` : ''}
                        ${p.skinship ? `<div class="info-item"><span class="label">첫스킨십</span><span class="value important-value">${p.skinship}</span></div>` : ''}
                        ${p.sexDate ? `<div class="info-item"><span class="label">첫빠구리</span><span class="value important-value">${p.sexDate}</span></div>` : ''}
                        ${p.trait ? `<div class="info-item"><span class="label">특징</span><span class="value">${p.trait}</span></div>` : ''}
                        ${p.taboo ? `<div class="info-item"><span class="label" style="color:red;">⚠️ 주의사항</span><span class="value">${p.taboo}</span></div>` : ''}
                    </div>

                    <div class="section-title">📝 기록 및 메모</div>
                    <div class="info-grid">
                        ${p.action ? `<div class="info-item"><span class="label">행위</span><span class="value">${p.action}</span></div>` : ''}
                        ${p.takenPhoto ? `<div class="info-item"><span class="label">찍은사진</span><span class="value">${p.takenPhoto}</span></div>` : ''}
                        ${p.tastes ? `<div class="info-item"><span class="label">취향/음식</span><span class="value">${p.tastes}</span></div>` : ''}
                        ${p.notion ? `<div class="info-item"><span class="label">노션 링크</span><span class="value"><a href="${p.notion}" target="_blank" style="color:#2563eb; font-weight:bold;">노션 열기</a></span></div>` : ''}
                    </div>

                    <div class="live-memo-container">
                        <span class="label" style="color:#854d0e;">📍 현장 실시간 메모 (자동 저장)</span>
                        <textarea class="live-memo-area" placeholder="내용 입력..." oninput="localStorage.setItem('memo_${p.id}', this.value)">${savedMemo}</textarea>
                    </div>
                    ${p.phone ? `<a href="tel:${p.phone}" class="btn-call">📞 지금 전화 걸기</a>` : ''}
                </div>
            `}).join('');
        }

        window.filterData = function() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = privateData.filter(p => 
                p.name.includes(query) || p.trait.includes(query) || p.personal.includes(query)
            );
            displayData(filtered);
        };

        document.addEventListener("DOMContentLoaded", fetchExcelData);
    }
</script>

<div id="mainContent">
    <div class="header"><h2>🔒 SMART 인물 수첩</h2></div>
    <input type="text" id="search" class="search-box" placeholder="이름, 특징, 신상정보 검색..." onkeyup="filterData()">
    <div id="listContainer"></div>
</div>

</body>
</html>
