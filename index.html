<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART 인물 전략 수첩</title>
    <style>
        :root { --primary: #e61e43; --secondary: #1d2b4f; --bg: #f0f2f5; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* 보안 섹션 */
        #auth-section { margin-top: 150px; text-align: center; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #auth-section input { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 200px; font-size: 16px; }
        #auth-section button { padding: 12px 25px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* 메인 컨텐츠 */
        #main-content { display: none; width: 100%; max-width: 500px; }
        .header-title { color: var(--primary); font-size: 24px; font-weight: bold; text-align: center; margin-bottom: 20px; }
        .search-bar { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 20px; box-sizing: border-box; }
        
        /* 카드 디자인 */
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 5px solid var(--primary); padding: 20px; position: relative; }
        .profile-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .profile-img { width: 70px; height: 70px; border-radius: 50%; background: #eee; object-fit: cover; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .profile-info h2 { margin: 0; font-size: 20px; color: #333; }
        .profile-info p { margin: 5px 0 0; color: #666; font-size: 14px; }
        
        .photo-btn { width: 100%; background: #f8f9fa; border: 1px solid #eee; padding: 10px; border-radius: 10px; cursor: pointer; color: #555; font-size: 13px; margin: 10px 0; }
        .photo-area { display: none; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .photo-area img { width: 120px; height: 160px; object-fit: cover; border-radius: 10px; flex-shrink: 0; border: 1px solid #ddd; }

        .section-title { font-size: 13px; font-weight: bold; color: #2d5af0; margin: 15px 0 10px; display: flex; align-items: center; gap: 5px; }
        .data-table { background: #f1f6ff; border-radius: 12px; padding: 15px; font-size: 13px; }
        .data-row { display: grid; grid-template-columns: 80px 1fr; margin-bottom: 8px; line-height: 1.4; }
        .label { color: #555; font-weight: bold; }
        .val-red { color: #e61e43; font-weight: bold; }
        .val-blue { color: #2d5af0; font-weight: bold; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { padding: 12px; border-radius: 10px; border: none; color: white; font-weight: bold; text-align: center; cursor: pointer; text-decoration: none; font-size: 14px; }
        .btn-call { background: #2d5af0; }
        .btn-notion { background: #1d2b4f; }
    </style>
</head>
<body>

    <div id="auth-section">
        <h2>🔒 SMART 인물 전략 수첩</h2>
        <p>인증이 필요합니다.</p>
        <input type="password" id="pw-input" placeholder="비밀번호 입력..." onkeypress="if(event.keyCode==13) checkPw()">
        <button onclick="checkPw()">확인</button>
    </div>

    <div id="main-content">
        <div class="header-title">🔒 SMART 인물 전략 수첩</div>
        <input type="text" class="search-bar" placeholder="이름, 대화주제 검색...">
        <div id="container">데이터를 불러오는 중...</div>
    </div>

    <script>
        function checkPw() {
            const pw = document.getElementById('pw-input').value;
            if(pw === '1234') { // <--- 비밀번호 수정
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                loadData();
            } else { alert('비밀번호가 틀렸습니다.'); }
        }

        function loadData() {
            fetch('인명.csv')
                .then(res => res.text())
                .then(data => {
                    const rows = data.split('\n').filter(r => r.trim()).slice(1);
                    const container = document.getElementById('container');
                    container.innerHTML = '';

                    rows.forEach(row => {
                        const col = row.split(',').map(c => c.trim());
                        const name = col[1], team = col[2], size = col[7], phone = col[3], cycle = col[22], skin = col[11], items = col[14], warning = col[19], photos = col[4];

                        // 사진 HTML 생성 (img/이름/파일명)
                        let photoImgs = '';
                        if(photos) {
                            photos.split(';').forEach(p => {
                                if(p.trim()) photoImgs += `<img src="img/${name}/${p.trim()}" onerror="this.src='https://via.placeholder.com/120x160?text=No+Photo'">`;
                            });
                        }

                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="profile-header">
                                <img class="profile-img" src="img/${name}/face.jpg" onerror="this.src='https://via.placeholder.com/100'">
                                <div class="profile-info">
                                    <h2>${name} <span style="color:#f39c12; font-size:14px;">★ 8</span></h2>
                                    <p>${team} | ${size}</p>
                                </div>
                            </div>
                            <button class="photo-btn" onclick="togglePhoto(this)">▼ 사진 보기 (몸매 확인)</button>
                            <div class="photo-area">${photoImgs}</div>
                            
                            <div class="section-title">⏱ 공략 및 관계 현황</div>
                            <div class="data-table">
                                <div class="data-row"><div class="label">연락/접근</div><div class="val-blue">${cycle}</div></div>
                                <div class="data-row"><div class="label">스킨십</div><div class="val-red">${skin}</div></div>
                                <div class="data-row"><div class="label">보유 전리품</div><div class="val-blue">${items}</div></div>
                            </div>

                            <div class="section-title">💬 실전 대화 포인트</div>
                            <div class="data-table">
                                <div class="data-row"><div class="label">⚠️ 주의사항</div><div class="val-red">${warning}</div></div>
                            </div>

                            <div class="btn-group">
                                <a href="tel:${phone}" class="btn btn-call">📞 전화</a>
                                <a href="#" class="btn btn-notion">📔 노션</a>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                });
        }

        function togglePhoto(btn) {
            const area = btn.nextElementSibling;
            area.style.display = (area.style.display === 'flex') ? 'none' : 'flex';
        }
    </script>
</body>
</html>
