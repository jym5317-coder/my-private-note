<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 SMART 인물 전략 수첩</title>
    <style>
        :root { --메인색: #e11d48; --포인트색: #2563eb; --배경색: #f1f5f9; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--배경색); margin: 0; padding: 10px; color: #1e293b; }
        #auth-section { margin-top: 150px; text-align: center; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        #auth-section input { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 180px; }
        #auth-section button { padding: 12px 20px; background: var(--메인색); color: white; border: none; border-radius: 8px; cursor: pointer; }
        #mainContent { max-width: 600px; margin: 0 auto; display: none; }
        .header { text-align: center; margin-bottom: 20px; color: var(--메인색); font-size: 24px; font-weight: bold; }
        .검색창 { width: 100%; padding: 15px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; }
        .카드 { background: white; border-radius: 20px; padding: 18px; margin-bottom: 25px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-top: 6px solid var(--메인색); }
        .상단영역 { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .프로필사진 { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background: #e2e8f0; }
        .기본정보 h2 { margin: 0; font-size: 22px; display: flex; align-items: center; gap: 8px; }
        .별점 { color: #f59e0b; font-size: 16px; }
        .소속텍스트 { color: #64748b; font-size: 14px; margin: 4px 0; font-weight: bold; }
        .사진버튼 { width: 100%; padding: 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; cursor: pointer; font-weight: bold; color: #475569; margin: 10px 0; }
        .사진영역 { display: none; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .사진영역 img { width: 140px; height: 180px; object-fit: cover; border-radius: 12px; flex-shrink: 0; border: 1px solid #ddd; }
        .섹션타이틀 { font-size: 15px; font-weight: 800; color: var(--포인트색); margin: 15px 0 10px; border-left: 4px solid var(--포인트색); padding-left: 8px; }
        .정보그리드 { background: #f8fafc; border-radius: 15px; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .정보항목 { display: grid; grid-template-columns: 100px 1fr; font-size: 14px; line-height: 1.5; }
        .라벨 { color: #64748b; font-weight: bold; }
        .값 { color: #1e293b; white-space: pre-wrap; } /* 줄바꿈 허용 */
        .강조값 { color: var(--메인색); font-weight: bold; }
        .버튼그룹 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .버튼 { padding: 14px; border-radius: 12px; color: white; font-weight: bold; text-align: center; text-decoration: none; font-size: 15px; }
    </style>
</head>
<body>

    <div id="auth-section">
        <h2 style="color:var(--메인색)">🔒 SMART 인물 전략 수첩</h2>
        <input type="password" id="pw-input" placeholder="비밀번호..." onkeypress="if(event.keyCode==13) 인증()">
        <button onclick="인증()">확인</button>
    </div>

    <div id="mainContent">
        <div class="header">🔒 SMART 인물 전략 수첩</div>
        <input type="text" id="search" class="검색창" placeholder="이름이나 소속으로 검색..." onkeyup="검색()">
        <div id="cardContainer">데이터를 불러오는 중...</div>
    </div>

    <script>
        let 전체데이터 = [];

        function 인증() {
            if(document.getElementById('pw-input').value === '1234') {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                데이터불러오기();
            } else { alert('비밀번호가 틀렸습니다.'); }
        }

        async function 데이터불러오기() {
            const res = await fetch('인명.csv');
            const data = await res.text();
            
            // 줄바꿈이 포함된 CSV를 제대로 나누는 정규식
            const rows = data.split(/\r?\n(?=(?:(?:[^"]*"){2})*[^"]*$)/).slice(1);

            전체데이터 = rows.map(row => {
                const col = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
                const c = (i) => col[i] ? col[i].replace(/^"|"$/g, '').trim() : '-';

                return {
                    이름: c(1), 소속: c(2), 연락처: c(3), 사진: c(4),
                    사이즈: c(7), 스킨십: c(11), 정복: c(12), 자료: c(14),
                    노션: c(17), 주의: c(19), 접근: c(22), 가성비: c(23),
                    호감: c(24), 화제: c(25), 고민: c(27), 난이도: c(28)
                };
            });
            화면표시(전체데이터);
        }

        function 화면표시(list) {
            const container = document.getElementById('cardContainer');
            container.innerHTML = list.map(p => {
                let imgTags = '';
                if(p.사진 !== '-') {
                    p.사진.split(/[,;]/).forEach(f => {
                        if(f.trim()) imgTags += `<img src="img/${p.이름}/${f.trim()}" onerror="this.style.display='none'">`;
                    });
                }
                return `
                <div class="카드">
                    <div class="상단영역">
                        <img class="프로필사진" src="img/${p.이름}/face.jpg" onerror="this.src='https://via.placeholder.com/100'">
                        <div class="기본정보">
                            <h2>${p.이름} <span class="별점">★ ${p.호감}</span></h2>
                            <div class="소속텍스트">${p.소속} | <span style="color:var(--메인색)">${p.사이즈}</span></div>
                        </div>
                    </div>
                    
                    <button class="사진버튼" onclick="let s=this.nextElementSibling.style; s.display=(s.display==='flex'?'none':'flex')">▼ 사진 보기 (몸매 확인)</button>
                    <div class="사진영역">${imgTags || '사진 없음'}</div>

                    <div class="섹션타이틀">⏱ 공략 현황 데이터</div>
                    <div class="정보그리드">
                        <div class="정보항목"><span class="라벨">스킨십/정복</span><span class="값 강조값">${p.스킨십} / ${p.정복}</span></div>
                        <div class="정보항목"><span class="라벨">가성비/난이도</span><span class="값">${p.가성비} / ${p.난이도}</span></div>
                        <div class="정보항목"><span class="라벨">접근가능시간</span><span class="값" style="color:var(--포인트색)">${p.접근}</span></div>
                    </div>

                    <div class="섹션타이틀">⚠️ 상세 메모 및 주의사항</div>
                    <div class="정보그리드">
                        <div class="정보항목"><span class="라벨">보유자료</span><span class="값">${p.자료}</span></div>
                        <div class="정보항목"><span class="라벨">주의사항</span><span class="값 강조값">${p.주의}</span></div>
                        <div class="정보항목"><span class="라벨">최근고민</span><span class="값">${p.고민}</span></div>
                    </div>

                    <div class="버튼그룹">
                        <a href="tel:${p.연락처}" class="버튼" style="background:var(--포인트색)">📞 전화</a>
                        <a href="${p.노션 !== '-' ? p.노션 : '#'}" target="_blank" class="버튼" style="background:#0f172a">📔 노션링크</a>
                    </div>
                </div>`;
            }).join('');
        }

        function 검색() {
            const q = document.getElementById('search').value.toLowerCase();
            화면표시(전체데이터.filter(p => p.이름.includes(q) || p.소속.includes(q)));
        }
    </script>
</body>
</html>
