<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 스마트 인물 수첩 (최종 정밀 보정)</title>
    <style>
        :root { --primary-color: #e11d48; --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f1f5f9; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); margin: 0; padding: 10px; color: var(--text-main); }
        #mainContent { max-width: 600px; margin: 0 auto; display: none; }
        .header { text-align: center; margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #334155; }
        .search-box { width: 100%; padding: 15px; border: 2px solid #334155; border-radius: 12px; font-size: 16px; margin-bottom: 20px; outline: none; box-sizing: border-box; background: #1e293b; color: white; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 15px; margin-bottom: 20px; border-left: 6px solid var(--primary-color); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        .card-top { display: flex; align-items: center; margin-bottom: 12px; gap: 15px; }
        .profile-img { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; background: #334155; }
        .name-info h3 { margin: 0; font-size: 20px; color: #fb7185; }
        .name-info p { margin: 2px 0 0; font-size: 13px; color: #94a3b8; }
        .info-grid { display: grid; grid-template-columns: 1fr; gap: 4px; background: #0f172a; padding: 10px; border-radius: 10px; margin-top: 10px; }
        .info-item { display: flex; align-items: flex-start; padding: 3px 0; border-bottom: 1px solid #1e293b; }
        .label { font-size: 11px; font-weight: 800; color: #fb7185; width: 80px; flex-shrink: 0; }
        .value { font-size: 13px; color: #cbd5e1; white-space: pre-wrap; flex-grow: 1; }
        .memo-box { margin-top: 10px; padding: 8px; background: #334155; border-radius: 8px; font-size: 13px; min-height: 40px; border: 1px solid #475569; }
    </style>
</head>
<body>

<script>
    const csvUrl = "인명.csv";
    const myPassword = "1234";
    let privateData = [];

    const login = prompt("접근 암호:");
    if (login !== myPassword) { alert("권한 없음"); window.stop(); }
    else {
        // 쉼표(,) 기준 데이터 분리 로직 보강
        function parseCSV(text) {
            return text.split(/\r?\n/).filter(line => line.trim()).map(line => {
                let parts = [];
                let current = '';
                let inQuotes = false;
                for (let char of line) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { parts.push(current.trim()); current = ''; }
                    else { current += char; }
                }
                parts.push(current.trim());
                return parts;
            });
        }

        async function init() {
            try {
                const res = await fetch(csvUrl + "?v=" + new Date().getTime()); // 캐시 방지
                const text = await res.text();
                const rows = parseCSV(text).slice(1); // 헤더 제외

                privateData = rows.map((cols, idx) => ({
                    id: cols[0] || 'idx_'+idx,
                    name: cols[1] || "데이터오류",
                    role: cols[2] || "",
                    phone: cols[3] || "",
                    photo: cols[4] || "",
                    size: cols[7] || "",
                    trait: cols[8] || "",
                    meet: cols[9] || "",
                    skinship: cols[10] || "",
                    sex: cols[11] || "",
                    action: cols[15] || ""
                })).filter(p => p.name !== "id" && p.name !== "데이터오류");

                render(privateData);
                document.getElementById('mainContent').style.display = 'block';
            } catch (e) { alert("파일 로드 실패. 저장 방식을 확인하세요."); }
        }

        function render(data) {
            const container = document.getElementById('listContainer');
            container.innerHTML = data.map(p => `
                <div class="card">
                    <div class="card-top">
                        <img src="${p.photo}" class="profile-img" onerror="this.src='https://via.placeholder.com/100?text=NO+IMG'">
                        <div class="name-info">
                            <h3>${p.name}</h3>
                            <p>${p.role}</p>
                        </div>
                    </div>
                    <div class="info-grid">
                        <div class="info-item"><span class="label">첫스킨십</span><span class="value" style="color:#fb7185; font-weight:bold;">${p.skinship}</span></div>
                        <div class="info-item"><span class="label">첫빠구리</span><span class="value" style="color:#fb7185; font-weight:bold;">${p.sex}</span></div>
                        <div class="info-item"><span class="label">사이즈</span><span class="value">${p.size}</span></div>
                        <div class="info-item"><span class="label">행위기록</span><span class="value">${p.action}</span></div>
                        <div class="info-item"><span class="label">특징</span><span class="value">${p.trait}</span></div>
                    </div>
                    <div class="memo-box" contenteditable="true" oninput="localStorage.setItem('m_'+'${p.id}', this.innerText)">
                        ${localStorage.getItem('m_'+p.id) || "현장 메모..."}
                    </div>
                </div>
            `).join('');
        }

        window.filterData = function() {
            const q = document.getElementById('search').value.toLowerCase();
            render(privateData.filter(p => p.name.includes(q) || p.trait.includes(q)));
        };

        document.addEventListener("DOMContentLoaded", init);
    }
</script>

<div id="mainContent">
    <div class="header"><h2>🔒 SMART 정복 수첩</h2></div>
    <input type="text" id="search" class="search-box" placeholder="이름 또는 특징 검색..." onkeyup="filterData()">
    <div id="listContainer"></div>
</div>

</body>
</html>
