<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 스마트 인물 수첩</title>
    <style>
        :root { --primary-color: #e11d48; --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f1f5f9; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); margin: 0; padding: 10px; color: var(--text-main); }
        #mainContent { max-width: 600px; margin: 0 auto; display: none; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .search-box { width: 100%; padding: 15px; border: 2px solid #334155; border-radius: 12px; font-size: 16px; margin-bottom: 20px; background: #1e293b; color: white; box-sizing: border-box; outline: none; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 15px; margin-bottom: 20px; border-left: 6px solid var(--primary-color); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        .card-top { display: flex; align-items: center; margin-bottom: 12px; gap: 15px; }
        .profile-img { width: 75px; height: 75px; border-radius: 12px; object-fit: cover; background: #334155; border: 1px solid #475569; }
        .name-info h3 { margin: 0; font-size: 22px; color: #fb7185; }
        .name-info p { margin: 3px 0 0; font-size: 14px; color: #94a3b8; }
        .info-grid { display: grid; grid-template-columns: 1fr; gap: 5px; background: #0f172a; padding: 10px; border-radius: 8px; }
        .info-item { display: flex; border-bottom: 1px solid #1e293b; padding: 4px 0; }
        .label { font-size: 12px; font-weight: 800; color: #fb7185; width: 85px; flex-shrink: 0; }
        .value { font-size: 14px; color: #cbd5e1; white-space: pre-wrap; word-break: break-all; }
        .live-memo { margin-top: 15px; padding: 10px; background: #334155; border-radius: 10px; }
        .live-memo textarea { width: 100%; height: 60px; border: none; background: transparent; font-size: 14px; color: #fff; resize: none; outline: none; }
    </style>
</head>
<body>

<script>
    const csvUrl = "인명.csv";
    const myPassword = "1234";
    let privateData = [];

    const login = prompt("접근 암호:");
    if (login !== myPassword) { alert("인증 실패"); window.stop(); }
    else {
        function parseCSV(text) {
            const rows = [];
            const lines = text.split(/\r?\n/);
            for (let line of lines) {
                if (line.trim()) {
                    let parts = [];
                    let current = '';
                    let inQuotes = false;
                    for (let char of line) {
                        if (char === '"') inQuotes = !inQuotes;
                        else if (char === ',' && !inQuotes) { parts.push(current.trim()); current = ''; }
                        else { current += char; }
                    }
                    parts.push(current.trim());
                    rows.push(parts);
                }
            }
            return rows;
        }

        async function loadData() {
            try {
                const response = await fetch(csvUrl + "?v=" + new Date().getTime());
                const text = await response.text();
                const allRows = parseCSV(text);
                
                // 사장님의 CSV 열 순서에 정확히 맞춘 매핑
                privateData = allRows.slice(1).map((cols, index) => ({
                    id: cols[0] || 'idx_' + index, // A: id
                    name: cols[1] || "",           // B: name
                    role: cols[2] || "",           // C: role
                    phone: cols[3] || "",          // D: phone
                    photo: cols[4] || "",          // E: photo
                    size: cols[7] || "",           // H: size
                    trait: cols[8] || "",          // I: trait
                    meet: cols[9] || "",           // J: 처음만난시기
                    skinship: cols[10] || "",      // K: 첫스킨십
                    sexDate: cols[11] || "",       // L: 첫빠구리
                    action: cols[15] || "",        // P: 행위
                    notion: cols[17] || ""         // R: notion
                })).filter(p => p.name && p.name !== "name");

                display(privateData);
                document.getElementById('mainContent').style.display = 'block';
            } catch (e) { alert("데이터 로드 실패"); }
        }

        function display(data) {
            const container = document.getElementById('listContainer');
            container.innerHTML = data.map(p => `
                <div class="card">
                    <div class="card-top">
                        <img src="${p.photo}" class="profile-img" onerror="this.src='https://via.placeholder.com/100?text=NO+IMG'">
                        <div class="name-info">
                            <h3>${p.name}</h3>
                            <p>${p.role}</p>
                        </div>
                    </div>
                    <div class="info-grid">
                        <div class="info-item"><span class="label">첫스킨십</span><span class="value" style="color:#fb7185; font-weight:bold;">${p.skinship}</span></div>
                        <div class="info-item"><span class="label">첫빠구리</span><span class="value" style="color:#fb7185; font-weight:bold;">${p.sexDate}</span></div>
                        <div class="info-item"><span class="label">사이즈</span><span class="value">${p.size}</span></div>
                        <div class="info-item"><span class="label">특징</span><span class="value">${p.trait}</span></div>
                        <div class="info-item"><span class="label">행위기록</span><span class="value">${p.action}</span></div>
                        ${p.notion ? `<div class="info-item"><span class="label">노션상세</span><span class="value"><a href="${p.notion}" target="_blank" style="color:#fb7185;">링크 열기</a></span></div>` : ''}
                    </div>
                    <div class="live-memo">
                        <textarea placeholder="현장 메모..." oninput="localStorage.setItem('m_'+'${p.id}', this.value)">${localStorage.getItem('m_'+p.id) || ""}</textarea>
                    </div>
                </div>
            `).join('');
        }

        window.filterData = function() {
            const q = document.getElementById('search').value.toLowerCase();
            display(privateData.filter(p => p.name.includes(q) || p.trait.includes(q)));
        };

        document.addEventListener("DOMContentLoaded", loadData);
    }
</script>

<div id="mainContent">
    <div class="header"><h2>🔒 SMART 인물 수첩</h2></div>
    <input type="text" id="search" class="search-box" placeholder="이름 또는 특징 검색..." onkeyup="filterData()">
    <div id="listContainer"></div>
</div>
</body>
</html>
